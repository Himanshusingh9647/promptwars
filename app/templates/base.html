<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MonsoonGuard — AI-powered monsoon preparedness and citizen safety platform.">
    <meta name="theme-color" content="#111111">
    <title>{% block title %}MonsoonGuard — Clean & Smart Citizen Safety{% endblock %}</title>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="site-wrapper">
        <div class="site-content">
            <!-- Skip to main content link for keyboard/screen-reader users -->
            <a href="#main-content" class="sr-only" aria-label="Skip to main content">
                Skip to main content
            </a>

            {% include "components/navbar.html" %}

            <main id="main-content" role="main">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
