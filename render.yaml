services:
  - type: web
    name: monsoonguard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: GENAI_PROVIDER
        value: google
      - key: GENAI_API_KEY
        sync: false # Set this securely in the Render dashboard
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
